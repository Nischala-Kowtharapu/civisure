<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Reports - CiviSure Admin</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🚨 CiviSure Admin</h2>
            </div>
            <nav>
                <ul class="sidebar-menu">
                    <li><a href="admin-dashboard.html">📊 Dashboard</a></li>
                    <li><a href="review-reports.html" class="active">📝 Review Reports</a></li>
                    <li><a href="admin-map.html">🗺️ Live Crime Map</a></li>
                    <li><a href="#" id="logoutBtn">🚪 Logout</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>Review Crime Reports</h1>
                <button class="btn btn-secondary" onclick="window.location.href='admin-dashboard.html'">Back to Dashboard</button>
            </div>

            <div class="content-area">
                <div class="filters">
                    <div class="filters-grid">
                        <div class="form-group">
                            <label for="statusFilter">Filter by Status</label>
                            <select id="statusFilter">
                                <option value="">All Status</option>
                                <option value="pending">Pending</option>
                                <option value="investigating">Investigating</option>
                                <option value="resolved">Resolved</option>
                                <option value="rejected">Rejected</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="categoryFilter">Filter by Category</label>
                            <select id="categoryFilter">
                                <option value="">All Categories</option>
                                <option value="Theft">Theft/Robbery</option>
                                <option value="Assault">Assault</option>
                                <option value="Vandalism">Vandalism</option>
                                <option value="Harassment">Harassment</option>
                                <option value="Fraud">Fraud</option>
                                <option value="Drug">Drug-related</option>
                                <option value="Traffic">Traffic Violations</option>
                                <option value="Domestic">Domestic Violence</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group" style="display: flex; align-items: flex-end;">
                            <button class="btn btn-primary" id="applyFilters">Apply Filters</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">All Reports</h2>
                        <div id="reportCount"></div>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Category</th>
                                        <th>Description</th>
                                        <th>Location</th>
                                        <th>Status</th>
                                        <th>Trust Score</th>
                                        <th>Anonymous</th>
                                        <th>Date</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="reportsTable">
                                    <tr>
                                        <td colspan="8" style="text-align: center; padding: 2rem;">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="reportModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Report Details</h3>
                <button class="modal-close" onclick="utils.hideModal('reportModal')">×</button>
            </div>
            <div class="modal-body" id="reportDetails">
                Loading...
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="utils.hideModal('reportModal')">Close</button>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        (async () => {
            await auth.requireAdmin();
        })();

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('Are you sure you want to logout?')) {
                auth.logout();
            }
        });

        async function loadReports() {
            const status = document.getElementById('statusFilter').value;
            const category = document.getElementById('categoryFilter').value;

            try {
                const response = await fetch(`/api/reports?status=${status}&category=${category}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('reportCount').textContent = `${data.reports.length} reports`;
                    displayReports(data.reports);
                }
            } catch (error) {
                console.error('Load reports error:', error);
                utils.showToast('Failed to load reports', 'error');
            }
        }

        function displayReports(reports) {
            const tbody = document.getElementById('reportsTable');
            tbody.innerHTML = '';

            if (reports.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 2rem; color: #6b7280;">No reports found</td></tr>';
                return;
            }

            reports.forEach(report => {
                const trustScore = report.trust_score || 0;
                const trustColor = trustScore >= 75 ? '#10b981' : 
                                  trustScore >= 50 ? '#f59e0b' : '#ef4444';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${report.id}</td>
                    <td>${report.category}</td>
                    <td>${report.description.substring(0, 50)}...</td>
                    <td>${report.crime_location_address || report.location_address || 'N/A'}</td>
                    <td>
                        <select class="status-dropdown" data-report-id="${report.id}" data-original-status="${report.status}"
                            style="padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 4px; cursor: pointer; background: white; font-size: 0.875rem; font-weight: 500;">
                            <option value="pending" ${report.status === 'pending' ? 'selected' : ''}>Pending</option>
                            <option value="investigating" ${report.status === 'investigating' ? 'selected' : ''}>Investigating</option>
                            <option value="resolved" ${report.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                            <option value="rejected" ${report.status === 'rejected' ? 'selected' : ''}>Rejected</option>
                        </select>
                    </td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <div style="width: 60px; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden;">
                                <div style="width: ${trustScore}%; height: 100%; background: ${trustColor}; transition: width 0.3s;"></div>
                            </div>
                            <span style="font-weight: 600; font-size: 0.875rem; color: ${trustColor};">${trustScore}%</span>
                        </div>
                    </td>
                    <td>${report.anonymous ? 'Yes' : 'No'}</td>
                    <td>${new Date(report.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-small btn-primary" onclick="viewReportDetails(${report.id})">View</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Add event listeners to all status dropdowns
            document.querySelectorAll('.status-dropdown').forEach(dropdown => {
                dropdown.addEventListener('change', async (e) => {
                    const reportId = e.target.dataset.reportId;
                    const newStatus = e.target.value;
                    const originalValue = e.target.dataset.originalStatus;

                    if (confirm(`Change status to "${newStatus}"?`)) {
                        e.target.dataset.originalStatus = newStatus; // update so cancel works correctly after save
                        await updateStatus(reportId, newStatus);
                    } else {
                        e.target.value = originalValue;
                    }
                });
            });
        }

        async function updateStatus(reportId, newStatus) {
            console.log('Updating report #' + reportId + ' to: ' + newStatus);
            
            try {
                const response = await fetch(`/api/reports/${reportId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                const data = await response.json();
                console.log('Update response:', data);

                if (data.success) {
                    utils.showToast('✅ Status updated to: ' + newStatus, 'success');
                    // Reload after 1 second
                    setTimeout(() => {
                        loadReports();
                    }, 1000);
                } else {
                    utils.showToast('❌ ' + (data.message || 'Failed to update'), 'error');
                    loadReports();
                }
            } catch (error) {
                console.error('Update error:', error);
                utils.showToast('❌ Network error', 'error');
                loadReports();
            }
        }

        async function viewReportDetails(reportId) {
            try {
                const response = await fetch(`/api/reports/${reportId}`);
                const data = await response.json();

                if (data.success) {
                    const report = data.report;
                    
                    // Trust score styling
                    const trustScore = report.trust_score || 0;
                    const trustColor = trustScore >= 75 ? '#10b981' : 
                                      trustScore >= 50 ? '#f59e0b' : '#ef4444';
                    const trustBg = trustScore >= 75 ? '#d1fae5' : 
                                   trustScore >= 50 ? '#fef3c7' : '#fee2e2';
                    
                    document.getElementById('reportDetails').innerHTML = `
                        <div style="line-height: 1.8;">
                            <p><strong>Report ID:</strong> #${report.id}</p>
                            <p><strong>Category:</strong> ${report.category}</p>
                            
                            <!-- AI TRUST SCORE DISPLAY -->
                            <div style="background: ${trustBg}; padding: 1.5rem; border-radius: 8px; border-left: 4px solid ${trustColor}; margin: 1.5rem 0;">
                                <h3 style="margin: 0 0 1rem 0; color: ${trustColor}; display: flex; align-items: center; gap: 0.5rem;">
                                    🤖 AI Trust Score: ${trustScore}%
                                    <div style="flex: 1; height: 12px; background: #e5e7eb; border-radius: 6px; overflow: hidden;">
                                        <div style="width: ${trustScore}%; height: 100%; background: ${trustColor}; transition: width 0.5s;"></div>
                                    </div>
                                </h3>
                                <p style="margin: 0.5rem 0;"><strong>Verification Status:</strong> 
                                    <span style="text-transform: uppercase; font-weight: 600; color: ${trustColor};">
                                        ${report.ai_verification_status || 'pending'}
                                    </span>
                                </p>
                                <p style="margin: 0.5rem 0;"><strong>AI Analysis:</strong> ${report.ai_analysis || 'No analysis available'}</p>
                                <div style="margin-top: 1rem; display: flex; gap: 1.5rem; flex-wrap: wrap;">
                                    <span style="display: flex; align-items: center; gap: 0.5rem;">
                                        ${report.location_verified ? '✅' : '❌'} <strong>Location Verified</strong>
                                    </span>
                                    <span style="display: flex; align-items: center; gap: 0.5rem;">
                                        ${report.timestamp_verified ? '✅' : '❌'} <strong>Timestamp Valid</strong>
                                    </span>
                                    <span style="display: flex; align-items: center; gap: 0.5rem;">
                                        ${report.evidence_verified ? '✅' : '❌'} <strong>Evidence Attached</strong>
                                    </span>
                                </div>
                            </div>
                            
                            <p><strong>Description:</strong><br>${report.description}</p>
                            
                            <h3 style="margin-top: 1.5rem; color: #ef4444;">🚨 Crime Location:</h3>
                            <p><strong>Address:</strong> ${report.crime_location_address || 'Not specified'}</p>
                            <p><strong>Coordinates:</strong> ${report.crime_location_lat}, ${report.crime_location_lng}</p>
                            
                            ${report.user_location_lat ? `
                                <h3 style="margin-top: 1.5rem; color: #10b981;">📱 Reporter's Location:</h3>
                                <p><strong>Address:</strong> ${report.user_location_address || 'Not specified'}</p>
                                <p><strong>Coordinates:</strong> ${report.user_location_lat}, ${report.user_location_lng}</p>
                            ` : ''}
                            
                            <p style="margin-top: 1.5rem;"><strong>Incident Date/Time:</strong> ${new Date(report.date_time).toLocaleString()}</p>
                            <p><strong>Status:</strong> <span class="badge badge-${report.status === 'resolved' ? 'success' : report.status === 'pending' ? 'warning' : 'primary'}">${report.status}</span></p>
                            <p><strong>Anonymous:</strong> ${report.anonymous ? 'Yes' : 'No'}</p>
                            ${!report.anonymous && report.reporter_name ? `<p><strong>Reporter:</strong> ${report.reporter_name} (${report.reporter_email})</p>` : ''}
                            ${report.evidence_files && report.evidence_files.length > 0 ? `
                                <p><strong>Evidence Files (${report.evidence_files.length}):</strong></p>
                                <ul>
                                    ${report.evidence_files.map(file => `<li><a href="/uploads/${file}" target="_blank">${file}</a></li>`).join('')}
                                </ul>
                            ` : '<p><strong>Evidence Files:</strong> None</p>'}
                            <p><strong>Submitted:</strong> ${new Date(report.created_at).toLocaleString()}</p>
                        </div>
                    `;
                    utils.showModal('reportModal');
                }
            } catch (error) {
                console.error('View report error:', error);
                utils.showToast('Failed to load report details', 'error');
            }
        }

        document.getElementById('applyFilters').addEventListener('click', loadReports);

        loadReports();
    </script>
</body>
</html>
